[tool.ruff.lint]
ignore = [
    "F403", # 停用 import * 的警告 (學生超愛用這個)
    "F405", # 停用 星號匯入導致的名稱來源不明警告
    "E722", # 停用 bare except 的警告 (學生常寫 try-except 但不指定錯誤類型)
    
    # --- 針對營隊新增的「寬容」規則 ---
    "E501", # 停用「行數過長」警告 (Pygame 參數很多，一行寫太長很正常)
    "F401", # 停用「未使用 import」警告 (學生常先 import 好工具，等下才要用)
    "E402", # 停用「import 必須在最上方」警告 (有時學生會為了除錯在 code 中間補 import)
    "B008", # 停用「函式調用作為預設參數」警告 (Pygame 初始化時學生常犯這個)
    "RET504" # 停用「回傳前多餘的變數賦值」警告 (學生習慣先 result = ... 再 return result)
]